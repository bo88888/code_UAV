<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
<title>能力感知 DAG 调度加速效果</title>
<defs>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
<feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity=".28"/>
</filter>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
<path d="M0,0 L12,6 L0,12 z" fill="#28D7E5"/>
</marker>
<linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
<stop offset="0" stop-color="#4C8DFF"/>
<stop offset="1" stop-color="#28D7E5"/>
</linearGradient>
</defs>
<rect x="0" y="0" width="1920" height="1080" rx="0" fill="#071426" stroke="none" stroke-width="1"/>
<circle cx="1740" cy="120" r="260" fill="#15395A" opacity=".35"/>
<circle cx="140" cy="970" r="330" fill="#113451" opacity=".28"/>
<text x="90" y="92" fill="#F2F7FC" font-size="52" font-weight="700" text-anchor="start" font-family="Microsoft YaHei, Arial, sans-serif">能力感知 DAG 调度加速效果</text>
<text x="90" y="138" fill="#A6BED0" font-size="25" font-weight="400" text-anchor="start" font-family="Microsoft YaHei, Arial, sans-serif">A 阶段环境检查与 B 阶段多算法并行执行，缩短任务保障总时延</text>
<rect x="90" y="205" width="1100" height="710" rx="20" fill="#0D223B" stroke="#1E4666" stroke-width="1"/>
<rect x="1240" y="205" width="590" height="710" rx="20" fill="#102B48" stroke="#1E4666" stroke-width="1"/>
<text x="150" y="408" fill="#F2F7FC" font-size="30" font-weight="700" text-anchor="start" font-family="Microsoft YaHei, Arial, sans-serif">串行调度</text>
<rect x="390" y="350" width="690" height="86" rx="18" fill="#173A57" stroke="none" stroke-width="1"/>
<rect x="390" y="350" width="690.0" height="86" rx="18" fill="#FFB547" stroke="none" stroke-width="1"/>
<text x="1040" y="408" fill="#071426" font-size="31" font-weight="700" text-anchor="end" font-family="Microsoft YaHei, Arial, sans-serif">1080 ms</text>
<text x="150" y="668" fill="#F2F7FC" font-size="30" font-weight="700" text-anchor="start" font-family="Microsoft YaHei, Arial, sans-serif">能力感知 DAG</text>
<rect x="390" y="610" width="690" height="86" rx="18" fill="#173A57" stroke="none" stroke-width="1"/>
<rect x="390" y="610" width="268.3333333333333" height="86" rx="18" fill="#28D7E5" stroke="none" stroke-width="1"/>
<text x="1100" y="668" fill="#28D7E5" font-size="31" font-weight="700" text-anchor="end" font-family="Microsoft YaHei, Arial, sans-serif">420 ms</text>
<text x="1535" y="340" fill="#28D7E5" font-size="112" font-weight="700" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif">2.57×</text>
<text x="1535" y="395" fill="#A6BED0" font-size="28" font-weight="500" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif">并行加速比</text>
<line x1="1335" y1="470" x2="1735" y2="470" stroke="#244561" stroke-width="2"/>
<text x="1535" y="590" fill="#48D597" font-size="88" font-weight="700" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif">61.11%</text>
<text x="1535" y="642" fill="#A6BED0" font-size="28" font-weight="500" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif">总时延节省</text>
<text x="1535" y="760" fill="#F2F7FC" font-size="30" font-weight="700" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif">1080 ms → 420 ms</text>
<text x="1535" y="805" fill="#A6BED0" font-size="21" font-weight="400" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif">环境检查和候选算法均并行</text>
<text x="960" y="1010" fill="#A6BED0" font-size="22" font-weight="400" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif">时延模型为固定服务耗时实验，用于隔离网络抖动并比较调度策略本身</text>
</svg>