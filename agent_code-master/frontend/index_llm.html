<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>低空智能体大模型调度平台</title>
<style>
body{margin:0;background:#eef3f8;color:#142033;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif}header,main{max-width:1500px;margin:auto;padding:22px 28px}h1{margin:0 0 8px}.sub{color:#667085}.layout{display:grid;grid-template-columns:390px 1fr;gap:18px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:18px;box-shadow:0 18px 46px rgba(15,23,42,.08);overflow:hidden}.hd{padding:14px 16px;border-bottom:1px solid #e5e7eb;background:#f8fafc;font-weight:900}.bd{padding:16px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.f{margin-bottom:12px}label{display:block;font-size:12px;font-weight:800;color:#344054;margin-bottom:6px}input,select,textarea{width:100%;padding:9px 10px;border:1px solid #d0d5dd;border-radius:10px;font-size:13px;font-family:inherit}textarea{min-height:90px}.sec{font-weight:900;margin:16px 0 10px}.btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}button{border:0;border-radius:12px;padding:10px 13px;font-weight:900;cursor:pointer}.primary{background:#2563eb;color:white}.ghost{background:#fff;border:1px solid #d0d5dd}.map{height:560px;border:1px solid #e5e7eb;border-radius:18px;overflow:hidden;background:#f3f5ef;position:relative}.badges{position:absolute;left:14px;top:14px;display:flex;gap:8px;z-index:2;flex-wrap:wrap}.tag{display:inline-block;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;background:#f2f4f7}.blue{background:#eff6ff;color:#1d4ed8}.green{background:#ecfdf3;color:#047857}.orange{background:#fff7ed;color:#c2410c}.purple{background:#f5f3ff;color:#6d28d9}.metrics{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-top:12px}.m{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:10px}.m small{display:block;color:#667085;margin-bottom:5px}.bar{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:12px}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#2563eb,#06b6d4,#10b981)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}.panel{border:1px solid #e5e7eb;border-radius:18px;background:#fff;padding:14px}.panel h3{margin:0 0 8px}.hint{color:#667085;font-size:12px;line-height:1.5}.route{border:1px solid #e5e7eb;border-radius:14px;background:#f8fafc;padding:10px;margin-top:8px}.route.best{background:#ecfdf3;border-color:#86efac}.llm{white-space:pre-wrap;line-height:1.7;font-size:13px;background:#f8fafc;border:1px solid #e5e7eb;border-radius:12px;padding:11px;max-height:330px;overflow:auto}@media(max-width:1100px){.layout,.grid{grid-template-columns:1fr}.metrics{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<header><h1>低空无人机智能体大模型调度平台</h1><div class="sub">规则调度器负责可控执行，大模型负责解释推荐理由、风险分析和重规划建议。</div></header>
<main class="layout">
<section class="card"><div class="hd">任务输入</div><div class="bd">
<div class="row"><div class="f"><label>任务 ID</label><input id="taskId" placeholder="留空自动生成"></div><div class="f"><label>XML 路径</label><input id="xmlPath" value="data/requirement.xml"></div></div>
<div class="row"><div class="f"><label>任务类型</label><select id="missionType"><option value="emergency_medical">应急医疗配送</option><option value="emergency_supply">应急物资配送</option><option value="standard_delivery">普通低空配送</option></select></div><div class="f"><label>货物重量 kg</label><input id="cargoWeight" type="number" value="2.5"></div></div>
<div class="f"><label>优先级 1-5</label><input id="priority" type="number" value="4"></div>
<div class="sec">取货点</div>
<div class="row"><div class="f"><label>名称</label><input id="pickupId" value="Hosp_A"></div><div class="f"><label>准备时间</label><input id="pickupReady" value="2026-06-11T10:00:00"></div></div>
<div class="row"><div class="f"><label>经度</label><input id="pickupLon" type="number" step="0.000001" value="114.05"></div><div class="f"><label>纬度</label><input id="pickupLat" type="number" step="0.000001" value="22.54"></div></div>
<div class="sec">配送点</div>
<div class="row"><div class="f"><label>名称</label><input id="dropoffId" value="Clinic_B"></div><div class="f"><label>截止时间</label><input id="dropoffDeadline" value="2026-06-11T10:30:00"></div></div>
<div class="row"><div class="f"><label>经度</label><input id="dropoffLon" type="number" step="0.000001" value="114.15"></div><div class="f"><label>纬度</label><input id="dropoffLat" type="number" step="0.000001" value="22.64"></div></div>
<div class="sec">环境约束</div>
<div class="row"><div class="f"><label>最大风速</label><input id="maxWind" type="number" value="10"></div><div class="f"><label>最大降水</label><input id="maxRain" type="number" value="5"></div></div>
<div class="row"><div class="f"><label>最低能见度</label><input id="minVisibility" type="number" value="2"></div><div class="f"><label>最大高度</label><input id="maxAltitude" type="number" value="120"></div></div>
<div class="f"><label>仿真场景</label><select id="scenario"><option value="normal">正常任务</option><option value="bad_weather">恶劣天气</option><option value="airspace_restricted">临时禁飞</option><option value="no_available_uav_once">无人机短时不可用</option><option value="no_available_uav">持续无可用无人机</option><option value="dock_congested">机巢拥堵</option></select></div>
<div class="btns"><button class="primary" id="runBtn" onclick="submitTask()">调用智能体调度</button><button class="ghost" onclick="preview()">预览点位</button></div><div id="err" class="hint"></div>
</div></section>
<section>
<div class="card"><div class="hd">低空实时执行地图</div><div class="bd"><div class="map"><div class="badges"><span class="tag blue" id="mode">执行方式：--</span><span class="tag orange" id="algo">策略：--</span><span class="tag purple" id="llmStatus">大模型：检测中</span></div><svg id="svg" viewBox="0 0 1080 560"></svg></div><div class="metrics"><div class="m"><small>经度</small><b id="lon">--</b></div><div class="m"><small>纬度</small><b id="lat">--</b></div><div class="m"><small>高度</small><b id="alt">--</b></div><div class="m"><small>速度</small><b id="spd">--</b></div><div class="m"><small>电量</small><b id="bat">--</b></div><div class="m"><small>阶段</small><b id="phase">--</b></div></div><div class="bar"><span id="bar"></span></div><div class="btns"><button class="primary" onclick="play()">开始回放</button><button class="ghost" onclick="pause()">暂停</button><button class="ghost" onclick="restart()">重放</button></div></div></div>
<div class="grid"><div class="panel"><h3>候选方案对比</h3><div id="candidates" class="hint">等待调度结果。</div></div><div class="panel"><h3>大模型调度分析</h3><div id="llmAnalysis" class="llm">等待调度完成后生成分析。</div></div><div class="panel"><h3>风险与执行摘要</h3><div id="summary" class="hint">等待调度结果。</div></div><div class="panel"><h3>大模型追问</h3><textarea id="question" placeholder="例如：为什么恶劣天气下推荐空地协同？"></textarea><div class="btns"><button class="primary" onclick="ask()">询问大模型</button></div><div id="answer" class="llm">暂无追问结果。</div></div></div>
</section>
</main>
<script>
const W=1080,H=560,pad=70;let data=null,telemetry=[],idx=0,timer=null,project=null,bestKey='';
function by(id){return document.getElementById(id)}function num(id){return Number(by(id).value)}function esc(s){return String(s??'').replaceAll('<','&lt;').replaceAll('>','&gt;')}
function payload(){return{task_id:by('taskId').value.trim(),requirement_xml_path:by('xmlPath').value.trim()||'data/requirement.xml',mission_type:by('missionType').value,delivery_points:[{id:by('pickupId').value,lon:num('pickupLon'),lat:num('pickupLat'),role:'pickup',ready_time:by('pickupReady').value},{id:by('dropoffId').value,lon:num('dropoffLon'),lat:num('dropoffLat'),role:'dropoff',deadline:by('dropoffDeadline').value}],cargo_weight_kg:num('cargoWeight'),priority:num('priority'),environmental_constraints:{max_wind_speed_mps:num('maxWind'),max_precipitation_mm_h:num('maxRain'),minimum_visibility_km:num('minVisibility'),maximum_altitude_m:num('maxAltitude')},output_requirements:{format:'json',need_risk_assessment:true,need_orchestration_trace:true,need_llm_analysis:true},simulation_scenario:by('scenario').value}}
async function status(){try{const r=await fetch('/api/v1/llm/status');const d=await r.json();by('llmStatus').textContent=d.enabled?'大模型：已连接':'大模型：未配置';by('llmStatus').className='tag '+(d.enabled?'green':'orange')}catch(e){by('llmStatus').textContent='大模型：未知'}}
async function submitTask(){by('err').textContent='';by('runBtn').disabled=true;try{const r=await fetch('/api/v1/task/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload())});data=await r.json();render(data)}catch(e){by('err').textContent=e.message}finally{by('runBtn').disabled=false;status()}}
function mode(sol){const t=String(sol.operational_mode||sol.assigned_vehicle_type||'');if(t.includes('ground_vehicle'))return'地面接驳车';if(t.includes('air_ground'))return'空地协同';if(t.includes('uav'))return'无人机';return'低空配送'}
function alg(sol){const t=String(sol.algorithm||sol.algorithm_used||sol.algorithm_trace_name||'');if(t.includes('AirGround'))return'天气自适应调度';if(t.includes('TWA'))return'医疗时间窗调度';if(t.includes('Coord'))return'多机任务分配';if(t.includes('DRL'))return'合规避障规划';return t||'综合调度'}
function key(sol){return String(sol.subtask_id||sol.algorithm_used||sol.algorithm||'')+'|'+mode(sol)}
function candidates(d){const arr=[...(d.candidate_solutions||[])];if(d.recommended_solution)arr.unshift(d.recommended_solution);const seen=new Set();return arr.filter(x=>{const k=key(x);if(seen.has(k))return false;seen.add(k);return (x.route_polyline_geo||[]).length})}
function render(d){const sol=d.recommended_solution||{};bestKey=key(sol);telemetry=sol.telemetry_stream||[];idx=0;by('mode').textContent='执行方式：'+mode(sol);by('algo').textContent='策略：'+alg(sol);by('llmAnalysis').textContent=d.llm_analysis?.text||'未生成大模型分析，请检查本地大模型服务配置。';by('summary').innerHTML=`任务状态：${d.mission_status||'--'}<br>风险等级：${d.risk_assessment?.risk_level||'--'} / ${d.risk_assessment?.risk_score??'--'}<br>重规划事件：${(d.orchestration?.replan_events||[]).length} 次<br>报告路径：${esc(d.report_path||'--')}`;renderCandidates(d);draw(d,sol);setFrame(0);play()}
function renderCandidates(d){const list=candidates(d);by('candidates').innerHTML=list.length?list.map(x=>`<div class="route ${key(x)===bestKey?'best':''}"><b>${key(x)===bestKey?'智能体最优':'候选方案'} · ${mode(x)} · ${alg(x)}</b><br>距离：${x.flight_distance_km??'--'} km；耗时：${x.estimated_duration_mins??'--'} min；能耗：${x.estimated_energy_kj??'--'} kJ；得分：${x.solution_score??'--'}</div>`).join(''):'暂无候选方案'}
function pointList(){return[{lon:num('pickupLon'),lat:num('pickupLat'),name:by('pickupId').value},{lon:num('dropoffLon'),lat:num('dropoffLat'),name:by('dropoffId').value}]}
function bounds(pts){const lons=pts.map(p=>+p.lon),lats=pts.map(p=>+p.lat);const lp=Math.max((Math.max(...lons)-Math.min(...lons))*.3,.015),ap=Math.max((Math.max(...lats)-Math.min(...lats))*.3,.015);return{minLon:Math.min(...lons)-lp,maxLon:Math.max(...lons)+lp,minLat:Math.min(...lats)-ap,maxLat:Math.max(...lats)+ap}}
function setProj(b){project=(lon,lat)=>({x:pad+(lon-b.minLon)/((b.maxLon-b.minLon)||1)*(W-pad*2),y:H-pad-(lat-b.minLat)/((b.maxLat-b.minLat)||1)*(H-pad*2)})}
function path(route){return route.map((p,i)=>{const q=project(+p.lon,+p.lat);return`${i?'L':'M'}${q.x.toFixed(1)} ${q.y.toFixed(1)}`}).join(' ')}
function draw(d,sol){const routes=candidates(d);const pts=routes.flatMap(r=>r.route_polyline_geo||[]);const base=pts.length?pts:pointList();setProj(bounds(base));let html='<rect width="1080" height="560" fill="#f3f5ef"/><path d="M70 470 C260 390 390 430 520 340 S800 240 1030 280" fill="none" stroke="#d1d5db" stroke-width="22" opacity=".75"/>';routes.forEach((r,i)=>{const best=key(r)===bestKey;html+=`<path d="${path(r.route_polyline_geo)}" fill="none" stroke="${best?'#059669':'#94a3b8'}" stroke-width="${best?6:3}" stroke-dasharray="${best?'0':'10 10'}" opacity="${best?0.95:0.58}"/>`});pointList().forEach((p,i)=>{const q=project(p.lon,p.lat);html+=`<circle cx="${q.x}" cy="${q.y}" r="14" fill="${i?'#dc2626':'#059669'}"/><text x="${q.x+18}" y="${q.y-8}" font-size="12" font-weight="900">${esc(p.name)}</text>`});html+='<path id="track" d="" fill="none" stroke="#06b6d4" stroke-width="5"/><circle id="vehicle" cx="0" cy="0" r="16" fill="#06b6d4" stroke="#0f172a" stroke-width="3"/>';by('svg').innerHTML=html}
function preview(){draw({candidate_solutions:[]},{})}
function setFrame(i){if(!telemetry.length||!project)return;idx=Math.max(0,Math.min(i,telemetry.length-1));const t=telemetry[idx],q=project(+t.lon,+t.lat);const d=telemetry.slice(0,idx+1).map((p,j)=>{const x=project(+p.lon,+p.lat);return`${j?'L':'M'}${x.x.toFixed(1)} ${x.y.toFixed(1)}`}).join(' ');by('track')?.setAttribute('d',d);by('vehicle')?.setAttribute('cx',q.x);by('vehicle')?.setAttribute('cy',q.y);by('lon').textContent=(+t.lon).toFixed(5);by('lat').textContent=(+t.lat).toFixed(5);by('alt').textContent=`${t.altitude_m} m`;by('spd').textContent=`${t.speed_kmh} km/h`;by('bat').textContent=`${t.battery_percent}%`;by('phase').textContent=t.phase||'--';by('bar').style.width=`${Math.round(idx/Math.max(telemetry.length-1,1)*100)}%`}
function play(){if(!telemetry.length)return;pause();timer=setInterval(()=>{setFrame(idx+1);if(idx>=telemetry.length-1)pause()},150)}function pause(){if(timer){clearInterval(timer);timer=null}}function restart(){idx=0;setFrame(0);play()}
async function ask(){const q=by('question').value.trim();if(!q){by('answer').textContent='请输入问题。';return}by('answer').textContent='分析中...';try{const r=await fetch('/api/v1/llm/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:(data?JSON.stringify(data).slice(0,5000)+'\n问题：':'')+q,mode:'chat',session_id:data?.task_id||'frontend'})});const d=await r.json();by('answer').textContent=d.text||'未返回内容。'}catch(e){by('answer').textContent=e.message}}
preview();status();
</script>
</body>
</html>
