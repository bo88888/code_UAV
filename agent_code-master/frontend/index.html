<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>低空无人机智能体实时调度平台</title><style>body{margin:0;background:#eef3f8;color:#142033;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif}header,main{max-width:1680px;margin:auto;padding:22px 28px}h1{margin:0 0 8px;font-size:30px}.sub{color:#667085;line-height:1.6}.layout{display:grid;grid-template-columns:420px 1fr;gap:20px}.card{background:white;border:1px solid #e5e7eb;border-radius:18px;box-shadow:0 18px 46px rgba(15,23,42,.08);overflow:hidden}.hd{padding:14px 16px;border-bottom:1px solid #e5e7eb;background:#f8fafc;font-weight:900}.bd{padding:16px}label{display:block;font-size:12px;font-weight:800;color:#344054;margin:0 0 6px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.f{margin-bottom:12px}input,select{width:100%;padding:9px 10px;border:1px solid #d0d5dd;border-radius:10px;font-size:13px}button{border:0;border-radius:12px;padding:10px 13px;font-weight:900;cursor:pointer}.primary{background:#2563eb;color:white}.ghost{background:white;border:1px solid #d0d5dd}.btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.sec{font-weight:900;margin:16px 0 10px}.scenario{display:grid;grid-template-columns:1fr 1fr;gap:8px}.sitem{padding:10px;border:1px solid #e5e7eb;border-radius:12px;background:#f8fafc;cursor:pointer;font-size:12px}.sitem.on{background:#eff6ff;border-color:#93c5fd}.map{height:640px;border:1px solid #e5e7eb;border-radius:18px;overflow:hidden;position:relative;background:#f3f5ef}.badges{position:absolute;left:14px;top:14px;display:flex;gap:8px;z-index:2;flex-wrap:wrap}.tag{border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;background:#f2f4f7}.blue{background:#eff6ff;color:#1d4ed8}.cyan{background:#ecfeff;color:#0e7490}.green{background:#ecfdf3;color:#047857}.orange{background:#fff7ed;color:#c2410c}.red{background:#fef2f2;color:#b91c1c}svg{width:100%;height:100%}.metrics{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-top:12px}.m{background:white;border:1px solid #e5e7eb;border-radius:12px;padding:10px}.m small{display:block;color:#667085;margin-bottom:5px}.m b{font-size:15px}.bar{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:12px}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#2563eb,#06b6d4,#10b981)}.below{display:grid;grid-template-columns:1fr 1.15fr 1fr;gap:14px;margin-top:14px}.box{border:1px solid #e5e7eb;border-radius:16px;background:white;padding:14px;min-height:210px}.box h3{margin:0 0 8px;font-size:15px}.hint{color:#667085;font-size:12px;line-height:1.5}.cg{display:grid;grid-template-columns:1fr 1fr;gap:8px}.c{border:1px solid #e5e7eb;border-radius:12px;padding:9px;background:#f8fafc}.c.good{background:#ecfdf3;border-color:#bbf7d0}.c.bad{background:#fef2f2;border-color:#fecaca}.c.warn{background:#fff7ed;border-color:#fed7aa}.rec{border:1px solid #bfdbfe;background:#eff6ff;border-radius:14px;padding:12px}.rec h4{margin:0 0 8px}.ev{display:grid;gap:8px;max-height:220px;overflow:auto}.ev div{border:1px solid #e5e7eb;background:#f8fafc;border-radius:10px;padding:8px;font-size:12px}.ev div.on{border-color:#06b6d4;background:#ecfeff;color:#0e7490;font-weight:800}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.tab{padding:7px 10px;border-radius:999px;background:#f2f4f7;font-size:13px;cursor:pointer}.tab.on{background:#eff6ff;color:#1d4ed8;font-weight:900}.panel{display:none}.panel.on{display:block}table{width:100%;border-collapse:collapse;font-size:12px}td,th{border:1px solid #e5e7eb;padding:8px;text-align:left}th{background:#f8fafc}@media(max-width:1200px){.layout{grid-template-columns:1fr}.below,.metrics{grid-template-columns:1fr 1fr}}</style></head><body><header><h1>低空无人机智能体实时调度平台</h1><div class="sub">系统根据环境约束自动推荐执行方式：无人机、地面接驳车、空地协同。空地协同时地图会同时显示无人机与接驳车。</div></header><main class="layout"><section class="card"><div class="hd">任务输入</div><div class="bd"><div class="row"><div class="f"><label>任务 ID</label><input id="taskId" placeholder="留空自动生成"></div><div class="f"><label>XML 路径</label><input id="xmlPath" value="data/requirement.xml"></div></div><div class="row"><div class="f"><label>任务类型</label><select id="missionType"><option value="emergency_medical">应急医疗配送</option><option value="emergency_supply">应急物资配送</option><option value="standard_delivery">普通低空配送</option></select></div><div class="f"><label>货物重量 kg</label><input id="cargoWeight" type="number" value="2.5"></div></div><div class="f"><label>优先级 1-5</label><input id="priority" type="number" value="4"></div><div class="sec">取货点</div><div class="row"><div class="f"><label>名称</label><input id="pickupId" value="Hosp_A"></div><div class="f"><label>准备时间</label><input id="pickupReady" value="2026-06-11T10:00:00"></div></div><div class="row"><div class="f"><label>经度</label><input id="pickupLon" type="number" step="0.000001" value="114.05"></div><div class="f"><label>纬度</label><input id="pickupLat" type="number" step="0.000001" value="22.54"></div></div><div class="sec">配送点</div><div class="row"><div class="f"><label>名称</label><input id="dropoffId" value="Clinic_B"></div><div class="f"><label>截止时间</label><input id="dropoffDeadline" value="2026-06-11T10:30:00"></div></div><div class="row"><div class="f"><label>经度</label><input id="dropoffLon" type="number" step="0.000001" value="114.15"></div><div class="f"><label>纬度</label><input id="dropoffLat" type="number" step="0.000001" value="22.64"></div></div><div class="sec">环境约束</div><div class="row"><div class="f"><label>最大风速 m/s</label><input id="maxWind" type="number" value="10"></div><div class="f"><label>最大降水 mm/h</label><input id="maxRain" type="number" value="5"></div></div><div class="row"><div class="f"><label>最低能见度 km</label><input id="minVisibility" type="number" value="2"></div><div class="f"><label>最大飞行高度 m</label><input id="maxAltitude" type="number" value="120"></div></div><div class="f"><label>仿真场景</label><select id="scenarioSelect" onchange="setScenario(this.value)"><option value="normal">normal：正常任务</option><option value="bad_weather">bad_weather：恶劣天气</option><option value="airspace_restricted">airspace_restricted：临时禁飞</option><option value="no_available_uav_once">no_available_uav_once：无人机短时不可用</option><option value="no_available_uav">no_available_uav：持续无可用无人机</option><option value="dock_congested">dock_congested：机巢拥堵</option></select></div><div class="scenario" id="scenarioGrid"></div><div class="btns"><button class="primary" id="runBtn" onclick="submitTask()">调用智能体并实时执行</button><button class="ghost" onclick="resetDefaults()">恢复默认</button></div><div id="err" class="hint"></div></div></section><section><section class="card"><div class="hd">低空实时执行地图</div><div class="bd"><div class="map"><div class="badges"><span class="tag cyan" id="liveBadge">实时轨迹：未开始</span><span class="tag blue" id="modeBadge">执行方式：--</span><span class="tag" id="algoBadge">推荐策略：--</span><span class="tag orange" id="countBadge">评估方案：--</span></div><svg id="mapSvg" viewBox="0 0 1080 640"></svg></div><div class="metrics"><div class="m"><small>经度</small><b id="lon">--</b></div><div class="m"><small>纬度</small><b id="lat">--</b></div><div class="m"><small>高度</small><b id="alt">--</b></div><div class="m"><small>速度</small><b id="spd">--</b></div><div class="m"><small>电量</small><b id="bat">--</b></div><div class="m"><small>阶段</small><b id="phase">--</b></div></div><div class="bar"><span id="bar"></span></div><div class="btns"><button class="primary" onclick="playTelemetry()">开始实时执行</button><button class="ghost" onclick="pauseTelemetry()">暂停</button><button class="ghost" onclick="restartTelemetry()">重放</button></div><div class="below"><div class="box"><h3>环境约束影响</h3><div class="hint">约束会影响是否派无人机、接驳车或空地协同。</div><div class="cg" id="constraintPanel"></div></div><div class="box"><h3>推荐执行方案</h3><div id="recommendPanel" class="rec">等待调度结果。</div></div><div class="box"><h3>实时事件流</h3><div id="events" class="ev"><div>等待执行指令...</div></div></div></div></div></section><section class="card" style="margin-top:20px"><div class="hd">智能体调度过程</div><div class="bd"><div class="tabs"><span class="tab on" onclick="tab('summary')">任务摘要</span><span class="tab" onclick="tab('lanes')">调度泳道</span><span class="tab" onclick="tab('decision')">决策依据</span><span class="tab" onclick="tab('tasks')">DAG 子任务</span><span class="tab" onclick="tab('replan')">重规划</span></div><div id="summary" class="panel on"><div class="hint">等待任务运行。</div></div><div id="lanes" class="panel"></div><div id="decision" class="panel"></div><div id="tasks" class="panel"></div><div id="replan" class="panel"></div></div></section></section></main><script>
const W=1080,H=640,pad=66;let lastPayload=null,lastData=null,telemetry=[],events=[],timer=null,idx=0,project=null,heading=0,mode='无人机';
const scenarios=[['normal','正常飞行','展示无人机实时飞行'],['bad_weather','恶劣天气','显示空地协同与接驳车'],['airspace_restricted','临时禁飞','触发地面安全接驳'],['no_available_uav_once','短时无机','等待后恢复资源'],['no_available_uav','持续无机','请求人工复核'],['dock_congested','机巢拥堵','影响执行资源']];
function renderScenarios(){scenarioGrid.innerHTML=scenarios.map(s=>`<div class="sitem" data-id="${s[0]}" onclick="setScenario('${s[0]}')"><b>${s[1]}</b><br><span>${s[2]}</span></div>`).join('');setScenario(scenarioSelect.value)}function setScenario(v){scenarioSelect.value=v;document.querySelectorAll('.sitem').forEach(e=>e.classList.toggle('on',e.dataset.id===v))}
function resetDefaults(){taskId.value='';xmlPath.value='data/requirement.xml';missionType.value='emergency_medical';cargoWeight.value='2.5';priority.value='4';pickupId.value='Hosp_A';pickupLon.value='114.05';pickupLat.value='22.54';pickupReady.value='2026-06-11T10:00:00';dropoffId.value='Clinic_B';dropoffLon.value='114.15';dropoffLat.value='22.64';dropoffDeadline.value='2026-06-11T10:30:00';maxWind.value='10';maxRain.value='5';minVisibility.value='2';maxAltitude.value='120';setScenario('normal')}
function n(id){return Number(document.getElementById(id).value)}function payload(){return{task_id:taskId.value.trim(),requirement_xml_path:xmlPath.value.trim()||'data/requirement.xml',mission_type:missionType.value,delivery_points:[{id:pickupId.value,lon:n('pickupLon'),lat:n('pickupLat'),role:'pickup',ready_time:pickupReady.value},{id:dropoffId.value,lon:n('dropoffLon'),lat:n('dropoffLat'),role:'dropoff',deadline:dropoffDeadline.value}],cargo_weight_kg:n('cargoWeight'),priority:n('priority'),environmental_constraints:{max_wind_speed_mps:n('maxWind'),max_precipitation_mm_h:n('maxRain'),minimum_visibility_km:n('minVisibility'),maximum_altitude_m:n('maxAltitude')},output_requirements:{format:'json',need_risk_assessment:true,need_orchestration_trace:true},simulation_scenario:scenarioSelect.value}}
async function checkHealth(){try{const r=await fetch('/health');const d=await r.json();document.querySelector('.status-pill').textContent=`服务状态：${d.status}`;document.querySelector('.status-pill').style.color='#059669'}catch(e){document.querySelector('.status-pill').textContent='服务状态：连接失败'}}
async function submitTask(){err.textContent='';runBtn.disabled=true;try{lastPayload=payload();const r=await fetch('/api/v1/task/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(lastPayload)});const d=await r.json();if(!r.ok)throw new Error(JSON.stringify(d));lastData=d;render(d)}catch(e){err.textContent=e.message}finally{runBtn.disabled=false}}
function rawMode(sol){const t=String(sol.operational_mode||sol.assigned_vehicle_type||'');if(t.includes('ground_vehicle'))return'地面接驳车';if(t.includes('air_ground'))return'空地协同';if(t.includes('uav'))return'无人机';return'低空配送'}
function showMode(sol){const alg=String(sol.algorithm||sol.algorithm_used||sol.algorithm_trace_name||'');const raw=rawMode(sol);if(raw==='地面接驳车'&&alg.includes('AirGround')&&lastPayload?.simulation_scenario==='bad_weather')return'空地协同';return raw}
function algName(sol){const t=String(sol.algorithm||sol.algorithm_used||'');if(t.includes('AirGround'))return'天气自适应调度';if(t.includes('TWA'))return'医疗时间窗调度';if(t.includes('Coord'))return'多机任务分配';if(t.includes('DRL'))return'合规避障规划';return t||'综合调度'}
function render(d){const sol=d.recommended_solution||{};mode=showMode(sol);telemetry=sol.telemetry_stream||[];events=buildEvents(sol);idx=0;modeBadge.textContent=`执行方式：${mode}`;algoBadge.textContent=`推荐策略：${algName(sol)}`;countBadge.textContent=`评估方案：${(d.candidate_solutions||[]).length}`;renderRecommend(d);renderConstraints(d,sol);renderMap(d,sol);renderPanels(d);setFrame(0);playTelemetry()}
function buildEvents(sol){if(mode==='空地协同')return[{progress:.08,event:'气象风险确认，启动空地协同'},{progress:.18,event:'无人机在安全交接点待命'},{progress:.32,event:'地面接驳车接收任务'},{progress:.62,event:'接驳车绕开天气影响区'},{progress:.92,event:'接驳车抵达配送点'}];return sol.tactical_events||[]}
function renderRecommend(d){const sol=d.recommended_solution||{};let text=mode==='空地协同'?'无人机在安全交接点待命，地面接驳车沿道路执行主运输段。':mode==='地面接驳车'?'无人机不执行飞行，接驳车沿地面道路完成转运。':'无人机执行低空飞行，并生成实时飞行轨迹。';recommendPanel.innerHTML=`<h4>${mode} · ${algName(sol)}</h4><p>后台评估 ${(d.candidate_solutions||[]).length} 类方案，最终推荐 ${mode}。</p><p>距离：${sol.flight_distance_km??'--'} km　预计耗时：${sol.estimated_duration_mins??'--'} min　能耗：${sol.estimated_energy_kj??'--'} kJ</p><p>${text}</p>`}
function renderConstraints(d,sol){const w=d.risk_assessment?.weather_snapshot||{},c=lastPayload.environmental_constraints||{},mx=Math.max(...(sol.route_polyline_geo||[]).map(p=>p.altitude_m||0),0);const it=[['风速约束',`${w.wind_speed_mps??'--'} / ${c.max_wind_speed_mps} m/s`,w.wind_speed_mps>c.max_wind_speed_mps?'bad':'good'],['降水约束',`${w.precipitation_mm_h??'--'} / ${c.max_precipitation_mm_h} mm/h`,w.precipitation_mm_h>c.max_precipitation_mm_h?'bad':'good'],['能见度约束',`${w.visibility_km??'--'} / ${c.minimum_visibility_km} km`,w.visibility_km<c.minimum_visibility_km?'bad':'good'],['高度上限',`${mx} / ${c.maximum_altitude_m} m`,mx>c.maximum_altitude_m?'bad':(mx>c.maximum_altitude_m*.85?'warn':'good')]];constraintPanel.innerHTML=it.map(x=>`<div class="c ${x[2]}"><small>${x[0]}</small><br><b>${x[1]}</b></div>`).join('')}
function bounds(route,obs){const lons=route.map(p=>+p.lon),lats=route.map(p=>+p.lat);obs.forEach(o=>{if(o.center_lon){lons.push(+o.center_lon);lats.push(+o.center_lat)}(o.polyline_geo||[]).forEach(p=>{lons.push(+p.lon);lats.push(+p.lat)})});const lp=Math.max((Math.max(...lons)-Math.min(...lons))*.22,.012),ap=Math.max((Math.max(...lats)-Math.min(...lats))*.22,.012);return{minLon:Math.min(...lons)-lp,maxLon:Math.max(...lons)+lp,minLat:Math.min(...lats)-ap,maxLat:Math.max(...lats)+ap}}
function renderMap(d,sol){pauseTelemetry();const route=sol.route_polyline_geo||[];const obs=(d.candidate_solutions||[]).flatMap(c=>c.obstacle_zones||[]);if(!route.length){drawEmpty();return}const b=bounds(route,obs);project=(lon,lat)=>({x:pad+(+lon-b.minLon)/((b.maxLon-b.minLon)||1)*(W-pad*2),y:H-pad-(+lat-b.minLat)/((b.maxLat-b.minLat)||1)*(H-pad*2)});mapSvg.innerHTML=`<defs><filter id="sh"><feDropShadow dx="0" dy="7" stdDeviation="7" flood-opacity=".25"/></filter><linearGradient id="live"><stop offset="0" stop-color="#2563eb"/><stop offset=".5" stop-color="#06b6d4"/><stop offset="1" stop-color="#10b981"/></linearGradient><pattern id="rain" width="18" height="18" patternUnits="userSpaceOnUse"><path d="M5 2 L1 12 M14 4 L10 16" stroke="#2563eb" stroke-width="2" opacity=".34"/></pattern><pattern id="wind" width="34" height="18" patternUnits="userSpaceOnUse"><path d="M2 9 H22 M16 4 L24 9 L16 14" stroke="#d97706" stroke-width="2" fill="none" opacity=".36"/></pattern></defs>${baseMap(route)}${constraintOverlay(d,sol)}${obstacles(obs)}${planned(route)}${nodes(route)}${coordLine(route)}<path id="glow" d="" fill="none" stroke="#22d3ee" stroke-width="18" stroke-linecap="round" opacity=".16"/><path id="track" d="" fill="none" stroke="url(#live)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="url(#sh)"/><g id="drone" filter="url(#sh)">${droneSvg()}</g><g id="car" filter="url(#sh)">${carSvg()}</g><circle id="pulse" cx="0" cy="0" r="20" fill="rgba(6,182,212,.15)" stroke="#06b6d4" stroke-width="2"/>`}
function baseMap(route){let blocks='';for(let i=0;i<30;i++){blocks+=`<rect x="${90+(i%8)*112}" y="${95+Math.floor(i/8)*105}" width="${52+i%4*9}" height="${36+i%5*7}" rx="7" fill="#e5e7dc" stroke="#d1d5c9"/>`}const roads=['M35 510 C228 446,360 470,540 382 S810 300,1045 260','M55 170 C225 222,395 182,565 238 S820 300,1040 208','M175 65 C280 210,222 360,392 590','M805 42 C706 196,763 398,680 610'].map((p,i)=>`<path d="${p}" fill="none" stroke="#fff" stroke-width="18"/><path d="${p}" fill="none" stroke="${i<2?'#f6c26b':'#aab7c4'}" stroke-width="3"/>`).join('');const pin=(r,t)=>{const p=project(r.lon,r.lat),c=t==='取货'?'#059669':'#dc2626';return`<g><circle cx="${p.x}" cy="${p.y}" r="16" fill="${c}"/><circle cx="${p.x}" cy="${p.y}" r="7" fill="#fff"/><text x="${p.x+20}" y="${p.y-14}" font-size="12" font-weight="900">${t}点</text></g>`};return`<rect width="1080" height="640" fill="#f3f5ef"/>${blocks}<path d="M0 472 C170 430,250 526,424 474 S730 400,1080 458 L1080 640 L0 640Z" fill="#bde7ff" opacity=".55"/>${roads}${pin(route[0],'取货')}${pin(route[route.length-1],'配送')}<text x="68" y="48" font-size="14" font-weight="900" fill="#334155">低空配送地图 / UTM Airspace</text>`}
function constraintOverlay(d,sol){const w=d.risk_assessment?.weather_snapshot||{},c=lastPayload.environmental_constraints||{};let s='';if(w.wind_speed_mps>c.max_wind_speed_mps)s+=`<ellipse cx="285" cy="170" rx="205" ry="90" fill="url(#wind)" stroke="#d97706" stroke-width="3" stroke-dasharray="10 8" opacity=".55"/><text x="110" y="95" fill="#92400e" font-size="13" font-weight="900">风速超限，低空飞行降权</text>`;if(w.precipitation_mm_h>c.max_precipitation_mm_h||w.visibility_km<c.minimum_visibility_km)s+=`<ellipse cx="795" cy="245" rx="185" ry="116" fill="url(#rain)" stroke="#2563eb" stroke-width="3" stroke-dasharray="10 8" opacity=".62"/><text x="660" y="130" fill="#1d4ed8" font-size="13" font-weight="900">恶劣天气影响区，启动空地协同</text>`;return s}
function obstacles(obs){const seen=new Set();return obs.filter(o=>!seen.has(o.id)&&seen.add(o.id)).map(o=>{if(o.polyline_geo){const ps=o.polyline_geo.map(p=>project(p.lon,p.lat));return`<path d="M${ps[0].x} ${ps[0].y} L${ps[1].x} ${ps[1].y}" stroke="#dc2626" stroke-width="8" stroke-dasharray="8 8" opacity=".55"/>`}const p=project(o.center_lon,o.center_lat),r=Math.max(30,Math.min(95,(o.radius_km||1)*22)),col=o.kind==='weather_cell'?'#2563eb':o.kind==='no_fly_zone'?'#dc2626':'#d97706';return`<circle cx="${p.x}" cy="${p.y}" r="${r}" fill="${col}22" stroke="${col}" stroke-width="3" stroke-dasharray="8 7"/><text x="${p.x-r}" y="${p.y-r-8}" fill="${col}" font-size="12" font-weight="900">${esc(o.name)}</text>`}).join('')}
function planned(route){const d=path(route);const col=mode==='无人机'?'#334155':'#0f766e';return`<path d="${d}" fill="none" stroke="${col}" stroke-width="20" opacity=".16" stroke-linecap="round"/><path d="${d}" fill="none" stroke="${col}" stroke-width="4" stroke-dasharray="10 12" opacity=".72" stroke-linecap="round"/>`}function nodes(route){return route.map(x=>{const p=project(x.lon,x.lat);return`<circle cx="${p.x}" cy="${p.y}" r="9" fill="#fff" stroke="#2563eb" stroke-width="3"/>`}).join('')}function path(route){return route.map((x,i)=>{const p=project(x.lon,x.lat);return`${i?'L':'M'}${p.x.toFixed(1)} ${p.y.toFixed(1)}`}).join(' ')}
function coordLine(route){if(mode!=='空地协同')return'';const a=project(route[0].lon,route[0].lat),b=transferPoint();return`<path d="M${a.x} ${a.y} L${b.x} ${b.y}" stroke="#06b6d4" stroke-width="4" stroke-dasharray="8 8"/><text x="${b.x+12}" y="${b.y-12}" fill="#0e7490" font-size="12" font-weight="900">空地协同交接点</text>`}
function droneSvg(){return`<g><ellipse cx="0" cy="8" rx="42" ry="14" fill="rgba(15,23,42,.15)"/><line x1="-30" y1="-24" x2="30" y2="24" stroke="#0f172a" stroke-width="5"/><line x1="30" y1="-24" x2="-30" y2="24" stroke="#0f172a" stroke-width="5"/><circle cx="-38" cy="-30" r="14" fill="#e0f2fe" stroke="#0284c7" stroke-width="4"/><circle cx="38" cy="-30" r="14" fill="#e0f2fe" stroke="#0284c7" stroke-width="4"/><circle cx="-38" cy="30" r="14" fill="#e0f2fe" stroke="#0284c7" stroke-width="4"/><circle cx="38" cy="30" r="14" fill="#e0f2fe" stroke="#0284c7" stroke-width="4"/><path d="M0 -38 L16 -5 H-16Z" fill="#06b6d4" stroke="#0f172a" stroke-width="3"/><ellipse cx="0" cy="0" rx="23" ry="15" fill="#111827"/><text x="0" y="62" text-anchor="middle" font-size="12" font-weight="900">无人机</text></g>`}
function carSvg(){return`<g><ellipse cx="0" cy="18" rx="36" ry="11" fill="rgba(15,23,42,.16)"/><rect x="-35" y="-16" width="70" height="34" rx="10" fill="#0f766e" stroke="#064e3b" stroke-width="4"/><path d="M-22 -16 L-10 -32 H15 L30 -16Z" fill="#14b8a6" stroke="#064e3b" stroke-width="4"/><circle cx="-22" cy="20" r="8" fill="#111827"/><circle cx="22" cy="20" r="8" fill="#111827"/><text x="0" y="50" text-anchor="middle" font-size="12" font-weight="900" fill="#064e3b">接驳车</text></g>`}
function transferPoint(){if(!telemetry.length||!project)return{x:150,y:150};const i=Math.floor(telemetry.length*.18);return project(telemetry[i].lon,telemetry[i].lat)}function setVehicle(t,p){const dr=document.getElementById('drone'),car=document.getElementById('car');if(mode==='无人机'){car.setAttribute('display','none');dr.setAttribute('display','block');dr.setAttribute('transform',`translate(${p.x} ${p.y}) rotate(${heading}) scale(.72)`)}else if(mode==='地面接驳车'){dr.setAttribute('display','none');car.setAttribute('display','block');car.setAttribute('transform',`translate(${p.x} ${p.y}) rotate(${heading}) scale(.82)`)}else{const tp=transferPoint();dr.setAttribute('display','block');dr.setAttribute('opacity','.95');dr.setAttribute('transform',`translate(${tp.x} ${tp.y}) scale(.62)`);car.setAttribute('display','block');car.setAttribute('transform',`translate(${p.x} ${p.y}) rotate(${heading}) scale(.82)`)}}
function setFrame(i){if(!telemetry.length||!project)return;idx=Math.max(0,Math.min(i,telemetry.length-1));const t=telemetry[idx],p=project(t.lon,t.lat);const pts=telemetry.slice(0,idx+1).map(x=>project(x.lon,x.lat));const d=pts.map((q,j)=>`${j?'L':'M'}${q.x.toFixed(1)} ${q.y.toFixed(1)}`).join(' ');track.setAttribute('d',d);glow.setAttribute('d',d);if(idx>0){const pp=project(telemetry[idx-1].lon,telemetry[idx-1].lat);heading=Math.atan2(p.y-pp.y,p.x-pp.x)*180/Math.PI+90}setVehicle(t,p);pulse.setAttribute('cx',p.x);pulse.setAttribute('cy',p.y);lon.textContent=(+t.lon).toFixed(5);lat.textContent=(+t.lat).toFixed(5);alt.textContent=mode==='空地协同'?'交接待命':`${t.altitude_m} m`;spd.textContent=`${t.speed_kmh} km/h`;bat.textContent=`${t.battery_percent}%`;phase.textContent=mode==='空地协同'?(idx<telemetry.length*.2?'无人机待命':'地面接驳'):phaseText(t.phase);bar.style.width=`${Math.round(idx/(telemetry.length-1)*100)}%`;liveBadge.textContent=`实时轨迹：${idx+1}/${telemetry.length} 帧`;renderEvents(t.progress||0)}
function phaseText(x){x=String(x||'');if(x.includes('ground'))return'地面接驳';if(x.includes('takeoff'))return'起飞';if(x.includes('landing'))return'降落';if(x.includes('avoidance'))return'避障';if(x.includes('cruise'))return'巡航';if(x.includes('arriving'))return'抵达';return x||'--'}function renderEvents(p){events=document.getElementById('events'),arr=window.events||[];if(!arr.length){events.innerHTML='<div>等待执行指令...</div>';return}events.innerHTML=arr.map(e=>`<div class="${p>=e.progress?'on':''}">${p>=e.progress?'●':'○'} ${Math.round(e.progress*100)}%　${esc(e.event)}</div>`).join('')}
function playTelemetry(){if(!telemetry.length)return;pauseTelemetry();timer=setInterval(()=>{setFrame(idx+1);if(idx>=telemetry.length-1)pauseTelemetry()},150)}function pauseTelemetry(){if(timer){clearInterval(timer);timer=null}}function restartTelemetry(){idx=0;setFrame(0);playTelemetry()}
function renderPanels(d){const sol=d.recommended_solution||{},risk=d.risk_assessment||{};summary.innerHTML=`<table><tr><th>项目</th><th>内容</th></tr><tr><td>推荐执行方式</td><td>${mode}</td></tr><tr><td>地图显示</td><td>${mode==='空地协同'?'无人机与接驳车同时显示。':mode==='地面接驳车'?'仅显示接驳车。':'仅显示无人机。'}</td></tr><tr><td>风险等级</td><td>${risk.risk_level||'--'}，score=${risk.risk_score??'--'}</td></tr></table>`;lanes.innerHTML='<div class="hint">输入理解 → 环境检查 → 方案评估 → 风险推荐 → 执行报告</div>';decision.innerHTML=`<div class="hint">${(risk.decision_basis||[]).join('<br>')||'综合比较风险、耗时、能耗、合规性和资源状态。'}</div>`;tasks.innerHTML=`<table><tr><th>子任务</th><th>阶段</th><th>工具</th><th>状态</th></tr>${(d.execution_status?.task_summary||[]).map(x=>`<tr><td>${esc(x.subtask_id)}</td><td>${esc(x.stage)}</td><td>${esc(x.tool_name)}</td><td>${esc(x.status)}</td></tr>`).join('')}</table>`;replan.innerHTML=(d.orchestration?.replan_events||[]).length?`<pre>${esc(JSON.stringify(d.orchestration.replan_events,null,2))}</pre>`:'<div class="hint">本次没有触发重规划。</div>'}
function tab(id){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));document.querySelectorAll('.panel').forEach(x=>x.classList.remove('on'));event.target.classList.add('on');document.getElementById(id).classList.add('on')}function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;')}function drawEmpty(){mapSvg.innerHTML='<rect width="1080" height="640" fill="#f3f5ef"/><path d="M0 472 C170 430,250 526,424 474 S730 400,1080 458 L1080 640 L0 640Z" fill="#bde7ff" opacity=".55"/><text x="540" y="320" text-anchor="middle" fill="#667085" font-size="16">等待智能体调度与空地协同推演</text>'}
renderScenarios();drawEmpty();checkHealth(false);
</script></body></html>
